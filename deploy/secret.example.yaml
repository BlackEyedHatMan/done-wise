# Secrets are created manually, out-of-band — never committed, never synced
# by ArgoCD (this file deliberately lives outside deploy/k8s/). Run on the
# cluster master AFTER `kubectl apply -f argo-cd/project.yml` has been applied
# (the namespace can be pre-created; ArgoCD also has CreateNamespace=true).
#
#   kubectl create namespace done-wise --dry-run=client -o yaml | kubectl apply -f -
#
#   # imagePullSecret for the GHCR package
#   kubectl -n done-wise create secret docker-registry ghcr-pull \
#     --docker-server=ghcr.io \
#     --docker-username=BlackEyedHatMan \
#     --docker-password=<GHCR read PAT>
#
#   # adapter tokens — generate each with: openssl rand -hex 32
#   kubectl -n done-wise create secret generic done-wise-secrets \
#     --from-literal=DONEWISE_APP_TOKEN=<random> \
#     --from-literal=DONEWISE_AGENT_TOKEN=<random>
#
# DONEWISE_APP_TOKEN   → pasted into the DoneWise extension's settings
# DONEWISE_AGENT_TOKEN → given to the agent (e.g. Estelle's skill env)
apiVersion: v1
kind: Secret
metadata:
  name: done-wise-secrets
  namespace: done-wise
type: Opaque
stringData:
  DONEWISE_APP_TOKEN: change-me
  DONEWISE_AGENT_TOKEN: change-me
