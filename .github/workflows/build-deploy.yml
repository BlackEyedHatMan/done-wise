name: build-deploy

# Plot-forge pattern: build the adapter image for the arm64 cluster, push to
# GHCR, sed the new tag into deploy/k8s/app.yaml, bot-commit — ArgoCD
# (auto-sync on deploy/k8s) rolls the cluster. The bump commit only touches
# deploy/**, which is outside `paths`, so it never re-triggers this workflow.

on:
  push:
    branches: [main]
    paths:
      - "adapter/**"
      - ".github/workflows/build-deploy.yml"

concurrency:
  group: build-deploy
  cancel-in-progress: false

permissions:
  contents: write # push the manifest tag bump
  packages: write # push to ghcr

jobs:
  build-push-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: BlackEyedHatMan
          # Deliberately a PAT, not GITHUB_TOKEN: packages first pushed with a
          # PAT aren't repo-linked and GITHUB_TOKEN gets 403.
          # Set with: GitHub → repo Settings → Secrets → Actions → GHCR_PAT
          password: ${{ secrets.GHCR_PAT }}
      - name: Set image tag
        id: tag
        run: echo "tag=sha-$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: ./adapter
          file: adapter/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/blackeyedhatman/done-wise-adapter:${{ steps.tag.outputs.tag }}
            ghcr.io/blackeyedhatman/done-wise-adapter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Bump image tag in manifest for Argo CD
        run: |
          sed -i -E "s|(image: ghcr.io/blackeyedhatman/done-wise-adapter:)[[:alnum:].-]+|\1${{ steps.tag.outputs.tag }}|" deploy/k8s/app.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/app.yaml
          git diff --cached --quiet || git commit -m "deploy: image ${{ steps.tag.outputs.tag }}"
          git push
