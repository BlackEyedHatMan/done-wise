apiVersion: apps/v1
kind: Deployment
metadata:
  name: done-wise-adapter
  labels:
    app: done-wise-adapter
spec:
  replicas: 1
  strategy:
    type: Recreate # single writer over one JSON file
  selector:
    matchLabels:
      app: done-wise-adapter
  template:
    metadata:
      labels:
        app: done-wise-adapter
    spec:
      containers:
        - name: adapter
          image: ghcr.io/blackeyedhatman/done-wise-adapter:latest
          ports:
            - containerPort: 8080
              name: http
          # Tokens come from a Secret created manually (never in git):
          #   kubectl -n <ns> create secret generic done-wise-secrets \
          #     --from-literal=DONEWISE_APP_TOKEN=… \
          #     --from-literal=DONEWISE_AGENT_TOKEN=…
          envFrom:
            - secretRef:
                name: done-wise-secrets
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: done-wise-adapter-data
