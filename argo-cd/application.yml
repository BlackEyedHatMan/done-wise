apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: done-wise
  namespace: argocd
spec:
  project: done-wise
  source:
    repoURL: https://github.com/BlackEyedHatMan/done-wise.git
    targetRevision: HEAD
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: done-wise
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
